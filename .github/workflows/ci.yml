name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore RiftReview.slnx

      - name: Build (warnings as errors)
        run: dotnet build RiftReview.slnx -c Debug -warnaserror --no-restore -v minimal

      - name: Test
        run: dotnet test RiftReview.slnx -c Debug --no-build --nologo -v minimal
